name: Publish Docker image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version to tag the image with (e.g. v2026.4.0)"
        required: true
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # On a release, use the release tag; on a manual run, use the input.
      # The leading "v" (if any) is stripped so the image tag is plain semver.
      - name: Resolve version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW="${{ github.event.release.tag_name }}"
          else
            RAW="${{ github.event.inputs.tag }}"
          fi
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"

      # For a release event this checks out the released commit (the tag).
      # For a manual run the ref is empty, so checkout uses the branch the
      # workflow was dispatched from (defaults to the default branch).
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
