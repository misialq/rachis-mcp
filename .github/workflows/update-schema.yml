name: Update Rachis Schema

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Rachis version (e.g. 2026.4)'
        required: true
        type: string

jobs:
  standalone-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_plugins: ${{ steps.matrix.outputs.has_plugins }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build standalone plugin matrix
        id: matrix
        run: |
          python - << 'EOF'
          import json, os
          path = '.github/standalone-plugins.json'
          plugins = []
          if os.path.exists(path):
              with open(path) as f:
                  for plugin in json.load(f):
                      if plugin.get('name') and plugin.get('repo'):
                          plugins.append({
                              'name': plugin['name'],
                              'repo': plugin['repo'],
                              'ref': plugin.get('ref', 'main'),
                              'env_dir': plugin.get('env_dir', 'environment-files'),
                          })
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"has_plugins={'true' if plugins else 'false'}\n")
              out.write(f"matrix={json.dumps({'include': plugins})}\n")
          EOF

  introspect-standalone:
    needs: standalone-matrix
    if: needs.standalone-matrix.outputs.has_plugins == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.standalone-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          init-shell: bash
          cache-downloads: true

      - name: Run Standalone Plugin Introspection
        shell: bash -el {0}
        run: |
          python .github/scripts/introspect_standalone_plugins.py \
            --version '${{ inputs.version }}' \
            --plugin-name '${{ matrix.name }}' \
            --repo '${{ matrix.repo }}' \
            --ref '${{ matrix.ref }}' \
            --env-dir '${{ matrix.env_dir }}' \
            --env-selection exact_requested \
            --output 'standalone-${{ matrix.name }}.json' \
            --summary 'standalone-${{ matrix.name }}.md'

      - name: Upload Standalone Plugin Artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: standalone-${{ matrix.name }}
          path: |
            standalone-${{ matrix.name }}.json
            standalone-${{ matrix.name }}.md
            standalone-${{ matrix.name }}.summary.json
          if-no-files-found: warn

  update-schema:
    needs:
      - standalone-matrix
      - introspect-standalone
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '24'

      - name: Run Tiny Introspection
        id: tiny
        run: |
          docker run --rm -v ${{ github.workspace }}:/mnt quay.io/qiime2/tiny:${{ inputs.version }} \
            python /mnt/.github/scripts/introspect_plugins.py > tiny.json
          docker rmi quay.io/qiime2/tiny:${{ inputs.version }}
      
      - name: Run Moshpit Introspection
        id: moshpit
        run: |
          docker run --rm -v ${{ github.workspace }}:/mnt quay.io/qiime2/moshpit:${{ inputs.version }} \
            python /mnt/.github/scripts/introspect_plugins.py > moshpit.json
          docker rmi quay.io/qiime2/moshpit:${{ inputs.version }}

      - name: Run QIIME2 Introspection
        id: amplicon
        run: |
          docker run --rm -v ${{ github.workspace }}:/mnt quay.io/qiime2/qiime2:${{ inputs.version }} \
            python /mnt/.github/scripts/introspect_plugins.py > qiime2.json
          docker rmi quay.io/qiime2/qiime2:${{ inputs.version }}

      - name: Run Pathogenome Introspection
        id: pathogenome
        continue-on-error: true
        run: |
          docker run --rm -v ${{ github.workspace }}:/mnt quay.io/qiime2/pathogenome:${{ inputs.version }} \
            python /mnt/.github/scripts/introspect_plugins.py > pathogenome.json
          docker rmi quay.io/qiime2/pathogenome:${{ inputs.version }}

      - name: Download Standalone Plugin Artifacts
        uses: actions/download-artifact@v8
        if: always()
        continue-on-error: true
        with:
          path: standalone-artifacts
          pattern: standalone-*

      - name: Combine Standalone Plugin Artifacts
        id: standalone
        if: always()
        shell: bash -el {0}
        run: |
          python .github/scripts/introspect_standalone_plugins.py \
            --version '${{ inputs.version }}' \
            --combine-artifacts standalone-artifacts \
            --output standalone.json \
            --summary standalone-summary.md

      - name: Merge and Format Schema
        shell: bash
        run: |
          standalone_arg=()
          if python - << 'EOF'
          import json, os, sys
          path = 'standalone.json'
          if not os.path.exists(path):
              sys.exit(1)
          with open(path) as f:
              data = json.load(f)
          sys.exit(0 if data else 1)
          EOF
          then
            standalone_arg=(standalone=standalone.json)
          fi

          python .github/scripts/merge_schemas.py raw_schema.json \
            tiny=tiny.json moshpit=moshpit.json qiime2=qiime2.json pathogenome=pathogenome.json "${standalone_arg[@]}"
          python - << 'EOF'
          import json
          with open('raw_schema.json') as f:
              data = json.load(f)
          data['rachis_version'] = '${{ inputs.version }}'
          import os; os.makedirs('src/schemas', exist_ok=True)
          with open('src/schemas/rachis-${{ inputs.version }}.json', 'w') as f:
              json.dump(data, f, indent=4, sort_keys=True)
          EOF

      - name: Regenerate Schema Registry
        run: node scripts/generate-schema-registry.mjs

      - name: Check for changes
        id: git-check
        run: |
          git add src/schemas/rachis-${{ inputs.version }}.json src/schema-registry.ts
          git diff --cached --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and Push
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m "chore: add schema for Rachis ${{ inputs.version }}"
          git push

      - name: Write Job Summary
        if: always()
        run: |
          python - << 'EOF'
          import json, os, glob, subprocess

          version    = '${{ inputs.version }}'
          outcomes   = {
              'tiny':        '${{ steps.tiny.outcome }}',
              'moshpit':     '${{ steps.moshpit.outcome }}',
              'qiime2':      '${{ steps.qiime2.outcome }}',
              'pathogenome': '${{ steps.pathogenome.outcome }}',
              'standalone':  '${{ steps.standalone.outcome }}',
          }
          committed  = '${{ steps.git-check.outputs.changes }}' == 'true'

          def icon(outcome):
              return {'success': '✅', 'failure': '❌', 'skipped': '⏭️'}.get(outcome, '❓')

          # Schema stats (best-effort — file may not exist if an earlier step failed)
          schema_path = f'src/schemas/rachis-{version}.json'
          stats = None
          if os.path.exists(schema_path):
              with open(schema_path) as f:
                  data = json.load(f)
              stats = {
                  'plugins': len(data.get('plugins', {})),
                  'actions': sum(len(p.get('actions', {})) for p in data.get('plugins', {}).values()),
                  'types':   len(data.get('types', {})),
              }

          # All known versions (sorted numerically)
          files = sorted(
              glob.glob('src/schemas/rachis-*.json'),
              key=lambda f: [int(x) for x in
                  os.path.basename(f).replace('rachis-', '').replace('.json', '').split('.')]
          )
          versions = [os.path.basename(f).replace('rachis-', '').replace('.json', '') for f in files]
          latest = versions[-1] if versions else '—'

          # New version or update?
          existed = subprocess.run(
              ['git', 'cat-file', '-e', f'HEAD~1:src/schemas/rachis-{version}.json'],
              capture_output=True
          ).returncode == 0
          change_label = '🔄 Updated existing version' if existed else '🆕 New version added'
          if not committed:
              change_label = '➖ No changes detected'

          lines = [
              f'## Schema Update: Rachis {version}',
              '',
              '### Introspection',
              '| Distribution | Outcome |',
              '|---|---|',
          ]
          for dist, outcome in outcomes.items():
              lines.append(f'| `{dist}` | {icon(outcome)} {outcome.capitalize()} |')

          standalone_summary = 'standalone-summary.md'
          if os.path.exists(standalone_summary):
              with open(standalone_summary) as f:
                  lines += ['', f.read().strip()]

          if stats:
              lines += [
                  '',
                  '### Schema Statistics',
                  '| Metric | Count |',
                  '|---|---|',
                  f'| Plugins | {stats["plugins"]} |',
                  f'| Actions | {stats["actions"]} |',
                  f'| Semantic Types | {stats["types"]} |',
              ]

          lines += [
              '',
              '### Registry',
              f'| | |',
              f'|---|---|',
              f'| Available versions | {", ".join(f"`{v}`" for v in versions)} |',
              f'| Latest | `{latest}` |',
              f'| Result | {change_label} |',
          ]

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write('\n'.join(lines) + '\n')
          EOF
